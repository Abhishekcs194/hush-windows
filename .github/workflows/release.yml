name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable + MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: false          # target dir is overridden below

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        env:
          CARGO_TARGET_DIR: C:\hush-target
          WHISPER_DONT_GENERATE_BINDINGS: "1"
        run: npm run tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          $out = "C:\hush-target\release\bundle"
          $dest = "dist-artifacts"
          New-Item -ItemType Directory -Force $dest | Out-Null
          # MSI installer
          Get-ChildItem "$out\msi\*.msi" -ErrorAction SilentlyContinue |
            Copy-Item -Destination $dest
          # NSIS installer (.exe)
          Get-ChildItem "$out\nsis\*.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination $dest
          # Portable exe (copy + zip)
          $exe = "C:\hush-target\release\hush-windows.exe"
          if (Test-Path $exe) {
            Copy-Item $exe "$dest\hush-windows.exe"
            Compress-Archive -Path $exe -DestinationPath "$dest\hush-windows-portable.zip" -Force
          }
          Get-ChildItem $dest | Select-Object Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: Hush ${{ github.ref_name || inputs.tag }}
          draft: true
          files: dist-artifacts/*
          body: |
            ## Hush ${{ github.ref_name || inputs.tag }}

            **Install**: Download and run the `.msi` (recommended) or `.exe` installer.
            **Portable**: Unzip `hush-windows-portable.zip` and run `hush-windows.exe`.

            ### First run
            1. The app downloads its AI speech model (~150 MB) automatically.
            2. Hold **Ctrl + Space** to start dictating.
            3. Release to transcribe and inject text at the cursor.
