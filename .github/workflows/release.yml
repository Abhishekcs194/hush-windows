name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable + MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install npm dependencies
        run: npm ci

      # Download all crate sources to the registry so we can patch before building.
      # whisper-rs-sys bundles Linux-generated bindings where whisper_gretype = c_uint;
      # MSVC requires c_int. We patch the extracted source file here.
      - name: Fetch Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml

      - name: Patch whisper-rs-sys bindings for MSVC
        shell: pwsh
        run: |
          $file = Get-ChildItem "$env:USERPROFILE\.cargo\registry\src" -Recurse -Filter "bindings.rs" |
            Where-Object { $_.FullName -match "whisper-rs-sys" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $file) { Write-Error "whisper-rs-sys bindings.rs not found"; exit 1 }
          $content = [System.IO.File]::ReadAllText($file)
          $patched = $content -replace 'pub type whisper_gretype = ::std::os::raw::c_uint', `
                                       'pub type whisper_gretype = ::std::os::raw::c_int'
          [System.IO.File]::WriteAllText($file, $patched)
          Write-Host "Patched: $file"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WHISPER_DONT_GENERATE_BINDINGS: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hush ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          releaseBody: |
            ## Hush ${{ github.ref_name }}

            **Install**: Download and run the `.msi` (recommended) or `.exe` installer.
            **Portable**: Run `hush-windows.exe` directly — no install needed.

            ### First run
            1. The app downloads its AI speech model (~150 MB) on first launch.
            2. Hold **Ctrl + Space** to start dictating.
            3. Release to transcribe and insert text at the cursor.
